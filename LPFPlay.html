<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.5.7/hls.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #47ffe8;
    --text: #e8e8f0;
    --muted: #555570;
    --bar-h: 4px;
  }
  html, body {
    height: 100%; width: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .wrap {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
  }

  /* ── Video Shell ── */
  .shell {
    position: relative;
    background: #000;
    border-radius: 8px 8px 0 0;
    overflow: hidden;
    aspect-ratio: 16/9;
    border: 1px solid var(--border);
    border-bottom: none;
  }
  .shell:fullscreen, .shell:-webkit-full-screen {
    border-radius: 0;
    width: 100vw; height: 100vh;
    display: flex; flex-direction: column;
    aspect-ratio: unset;
  }
  .shell:fullscreen video, .shell:-webkit-full-screen video { flex: 1; }
  .shell:fullscreen .controls-fs, .shell:-webkit-full-screen .controls-fs { display: flex !important; }

  video { width: 100%; height: 100%; display: block; object-fit: contain; }

  /* Loading */
  .loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,.7); transition: opacity .3s;
  }
  .loading.hidden { opacity: 0; pointer-events: none; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Play overlay */
  .play-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: opacity .2s;
  }
  .play-overlay.hidden { opacity: 0; pointer-events: none; }
  .play-overlay svg { filter: drop-shadow(0 0 18px var(--accent)); transition: transform .15s; }
  .play-overlay:hover svg { transform: scale(1.08); }

  /* Error */
  .error-box {
    position: absolute; inset: 0;
    background: rgba(0,0,0,.85);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: #ff6b6b; font-size: 13px;
    display: none;
  }
  .error-box.show { display: flex; }

  /* ── Controls Bar ── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-top: 2px solid var(--accent);
    border-radius: 0 0 8px 8px;
    padding: 10px 16px 14px;
    display: flex; flex-direction: column; gap: 10px;
  }

  /* Controls inside shell for fullscreen */
  .controls-fs {
    display: none;
    position: absolute; bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,.9));
    padding: 30px 16px 12px;
    flex-direction: column; gap: 10px;
    z-index: 10;
  }

  /* Progress */
  .progress-wrap {
    position: relative; height: 20px;
    display: flex; align-items: center; cursor: pointer;
  }
  .progress-track {
    width: 100%; height: var(--bar-h);
    background: var(--border); border-radius: 9px;
    position: relative; overflow: hidden;
  }
  .progress-buf {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: #2a2a3e; border-radius: 9px; transition: width .4s linear;
  }
  .progress-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    background: var(--accent); border-radius: 9px; transition: width .1s linear;
  }
  .progress-thumb {
    position: absolute; width: 12px; height: 12px;
    background: var(--accent); border-radius: 50%;
    top: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 8px var(--accent);
    pointer-events: none; transition: left .1s linear;
  }
  .time-tooltip {
    position: absolute; bottom: 22px;
    background: #000; color: var(--accent);
    font-size: 10px; padding: 2px 6px;
    border-radius: 4px; border: 1px solid var(--accent);
    pointer-events: none; display: none;
    transform: translateX(-50%);
  }

  /* Buttons */
  .btn-row { display: flex; align-items: center; gap: 6px; }
  .btn {
    background: none; border: none;
    color: var(--muted); cursor: pointer;
    padding: 5px; border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: color .15s, background .15s; flex-shrink: 0;
  }
  .btn:hover { color: var(--text); background: var(--border); }

  .time-disp {
    font-size: 11px; color: var(--muted);
    letter-spacing: .05em; flex: 1; text-align: center;
  }
  .time-disp span { color: var(--text); }

  /* Volume */
  .vol-wrap { display: flex; align-items: center; gap: 6px; }
  .vol-slider {
    -webkit-appearance: none;
    width: 70px; height: var(--bar-h);
    background: var(--border); border-radius: 9px;
    outline: none; cursor: pointer;
    accent-color: var(--accent2);
  }
  .vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    background: var(--accent2); border-radius: 50%;
    box-shadow: 0 0 6px var(--accent2);
  }

  /* Quality selector */
  .quality-wrap { position: relative; margin-left: auto; }
  .quality-btn {
    font-family: 'DM Mono', monospace;
    font-size: 10px; color: var(--accent2) !important;
    border: 1px solid var(--accent2) !important;
    border-radius: 4px; padding: 3px 7px;
    display: flex; align-items: center; gap: 2px;
    background: none; cursor: pointer;
    transition: background .15s;
  }
  .quality-btn:hover { background: rgba(71,255,232,.1) !important; }

  .quality-menu {
    position: absolute; bottom: calc(100% + 6px); right: 0;
    background: #0d0d16; border: 1px solid var(--border);
    border-radius: 6px; overflow: hidden;
    min-width: 90px;
    box-shadow: 0 4px 20px rgba(0,0,0,.6);
    display: none; flex-direction: column;
    z-index: 9999;
  }
  .quality-menu.open { display: flex; }
  .quality-option {
    padding: 7px 14px; font-size: 11px;
    color: var(--muted); cursor: pointer;
    transition: background .1s, color .1s;
    white-space: nowrap;
  }
  .quality-option:hover { background: var(--border); color: var(--text); }
  .quality-option.active { color: var(--accent2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="shell" id="shell">
    <video id="vid" playsinline></video>

    <div class="loading" id="loading"><div class="spinner"></div></div>

    <div class="play-overlay" id="playOverlay">
      <svg width="72" height="72" viewBox="0 0 72 72" fill="none">
        <circle cx="36" cy="36" r="35" stroke="#e8ff47" stroke-width="1.5" opacity=".5"/>
        <polygon points="28,20 56,36 28,52" fill="#e8ff47"/>
      </svg>
    </div>

    <div class="error-box" id="errBox">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r=".5" fill="#ff6b6b"/>
      </svg>
      <span id="errMsg">No se pudo cargar el stream</span>
    </div>

    <!-- Controles para fullscreen (dentro del shell) -->
    <div class="controls-fs" id="controlsFs">
      <div class="progress-wrap" id="progressWrapFs">
        <div class="progress-track">
          <div class="progress-buf" id="bufBarFs"></div>
          <div class="progress-fill" id="progFillFs"></div>
        </div>
        <div class="progress-thumb" id="progThumbFs"></div>
        <div class="time-tooltip" id="tooltipFs"></div>
      </div>
      <div class="btn-row">
        <button class="btn" id="playBtnFs">
          <svg id="playIconFs" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        </button>
        <button class="btn" id="bkBtnFs" title="-10s">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          </svg>
        </button>
        <button class="btn" id="fwBtnFs" title="+10s">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/>
          </svg>
        </button>
        <div class="time-disp"><span id="curTimeFs">0:00</span> / <span id="durDispFs">--:--</span></div>
        <div class="vol-wrap">
          <button class="btn" id="muteBtnFs">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path id="volWaveFs" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <input type="range" class="vol-slider" id="volSliderFs" min="0" max="1" step="0.02" value="1">
        </div>
        <button class="btn" id="fsBtnFs" title="Salir de pantalla completa">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="8 3 3 3 3 8"/><polyline points="21 8 21 3 16 3"/>
            <polyline points="3 16 3 21 8 21"/><polyline points="16 21 21 21 21 16"/>
          </svg>
        </button>
        <div class="quality-wrap">
          <button class="btn quality-btn" id="qualityBtnFs">
            <span id="qualityBadgeFs">AUTO</span>
            <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" style="margin-left:3px"><polygon points="0,3 5,8 10,3"/></svg>
          </button>
          <div class="quality-menu" id="qualityMenuFs"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Controles normales fuera del shell -->
  <div class="controls">
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-track">
        <div class="progress-buf" id="bufBar"></div>
        <div class="progress-fill" id="progFill"></div>
      </div>
      <div class="progress-thumb" id="progThumb"></div>
      <div class="time-tooltip" id="tooltip"></div>
    </div>
    <div class="btn-row">
      <button class="btn" id="playBtn">
        <svg id="playIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      </button>
      <button class="btn" id="bkBtn" title="-10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/>
          <text x="8" y="14" font-size="6" fill="currentColor" stroke="none" font-family="monospace">10</text>
        </svg>
      </button>
      <button class="btn" id="fwBtn" title="+10s">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/>
          <text x="8" y="14" font-size="6" fill="currentColor" stroke="none" font-family="monospace">10</text>
        </svg>
      </button>
      <div class="time-disp"><span id="curTime">0:00</span> / <span id="durDisp">--:--</span></div>
      <div class="vol-wrap">
        <button class="btn" id="muteBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
            <path id="volWave" d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
          </svg>
        </button>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="1" step="0.02" value="1">
      </div>
      <button class="btn" id="fsBtn" title="Pantalla completa">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <polyline points="8 3 3 3 3 8"/><polyline points="21 8 21 3 16 3"/>
          <polyline points="3 16 3 21 8 21"/><polyline points="16 21 21 21 21 16"/>
        </svg>
      </button>
      <div class="quality-wrap">
        <button class="btn quality-btn" id="qualityBtn">
          <span id="qualityBadge">AUTO</span>
          <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor" style="margin-left:3px"><polygon points="0,3 5,8 10,3"/></svg>
        </button>
        <div class="quality-menu" id="qualityMenu"></div>
      </div>
    </div>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const SRC = params.get('src') || "https://lpf.vod.immergo.tv/lpf-immergo/transcoded/1fc64bec-75a9-4ac9-a733-48ef37be1e68/hls/master.m3u8";

const vid = document.getElementById('vid');
const shell = document.getElementById('shell');
const loading = document.getElementById('loading');
const playOverlay = document.getElementById('playOverlay');
const errBox = document.getElementById('errBox');
const errMsg = document.getElementById('errMsg');

// Normal controls
const playBtn = document.getElementById('playBtn');
const playIcon = document.getElementById('playIcon');
const bkBtn = document.getElementById('bkBtn');
const fwBtn = document.getElementById('fwBtn');
const muteBtn = document.getElementById('muteBtn');
const volSlider = document.getElementById('volSlider');
const volWave = document.getElementById('volWave');
const fsBtn = document.getElementById('fsBtn');
const progFill = document.getElementById('progFill');
const progThumb = document.getElementById('progThumb');
const bufBar = document.getElementById('bufBar');
const progressWrap = document.getElementById('progressWrap');
const curTime = document.getElementById('curTime');
const durDisp = document.getElementById('durDisp');
const tooltip = document.getElementById('tooltip');
const qualityBtn = document.getElementById('qualityBtn');
const qualityBadge = document.getElementById('qualityBadge');
const qualityMenu = document.getElementById('qualityMenu');

// Fullscreen controls
const playBtnFs = document.getElementById('playBtnFs');
const playIconFs = document.getElementById('playIconFs');
const bkBtnFs = document.getElementById('bkBtnFs');
const fwBtnFs = document.getElementById('fwBtnFs');
const muteBtnFs = document.getElementById('muteBtnFs');
const volSliderFs = document.getElementById('volSliderFs');
const volWaveFs = document.getElementById('volWaveFs');
const fsBtnFs = document.getElementById('fsBtnFs');
const progFillFs = document.getElementById('progFillFs');
const progThumbFs = document.getElementById('progThumbFs');
const bufBarFs = document.getElementById('bufBarFs');
const progressWrapFs = document.getElementById('progressWrapFs');
const curTimeFs = document.getElementById('curTimeFs');
const durDispFs = document.getElementById('durDispFs');
const tooltipFs = document.getElementById('tooltipFs');
const qualityBtnFs = document.getElementById('qualityBtnFs');
const qualityBadgeFs = document.getElementById('qualityBadgeFs');
const qualityMenuFs = document.getElementById('qualityMenuFs');

let hls;
window._drag = false;
window._dragFs = false;

// ── HLS ──
function initPlayer() {
  if (Hls.isSupported()) {
    hls = new Hls({ enableWorker: true });
    hls.loadSource(SRC);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, () => {
      loading.classList.add('hidden');
      buildQualityMenus();
    });
    hls.on(Hls.Events.LEVEL_SWITCHED, (e, d) => {
      const lvl = hls.levels[d.level];
      const label = lvl?.height ? lvl.height + 'p' : 'AUTO';
      qualityBadge.textContent = label;
      qualityBadgeFs.textContent = label;
      document.querySelectorAll('.quality-option').forEach(opt => {
        opt.classList.toggle('active', parseInt(opt.dataset.level) === d.level);
      });
    });
    hls.on(Hls.Events.ERROR, (e, d) => { if (d.fatal) showError(d.details); });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    vid.src = SRC;
    vid.addEventListener('loadedmetadata', () => loading.classList.add('hidden'));
  } else {
    showError('Tu navegador no soporta HLS');
  }
}

function buildQualityMenus() {
  [qualityMenu, qualityMenuFs].forEach(menu => {
    menu.innerHTML = '';
    const auto = document.createElement('div');
    auto.className = 'quality-option active';
    auto.textContent = 'AUTO';
    auto.dataset.level = -1;
    auto.addEventListener('click', (e) => { e.stopPropagation(); setQuality(-1); });
    menu.appendChild(auto);
    hls.levels.forEach((lvl, i) => {
      const opt = document.createElement('div');
      opt.className = 'quality-option';
      opt.textContent = lvl.height ? lvl.height + 'p' : 'Nivel ' + i;
      opt.dataset.level = i;
      opt.addEventListener('click', (e) => { e.stopPropagation(); setQuality(i); });
      menu.appendChild(opt);
    });
  });
}

function setQuality(level) {
  hls.currentLevel = level;
  const label = level === -1 ? 'AUTO' : (hls.levels[level]?.height ? hls.levels[level].height + 'p' : 'Nivel ' + level);
  qualityBadge.textContent = label;
  qualityBadgeFs.textContent = label;
  qualityMenu.classList.remove('open');
  qualityMenuFs.classList.remove('open');
  document.querySelectorAll('.quality-option').forEach(opt => {
    opt.classList.toggle('active', parseInt(opt.dataset.level) === level);
  });
}

function showError(msg) {
  loading.classList.add('hidden');
  errBox.classList.add('show');
  errMsg.textContent = msg || 'No se pudo cargar el stream';
}

// ── Utils ──
function fmt(s) {
  if (!isFinite(s)) return '--:--';
  const m = Math.floor(s / 60), sec = Math.floor(s % 60);
  return m + ':' + String(sec).padStart(2, '0');
}

// ── Progress update ──
vid.addEventListener('timeupdate', () => {
  if (!vid.duration) return;
  const p = vid.currentTime / vid.duration * 100;
  if (!window._drag) {
    progFill.style.width = p + '%';
    progThumb.style.left = p + '%';
    curTime.textContent = fmt(vid.currentTime);
  }
  if (!window._dragFs) {
    progFillFs.style.width = p + '%';
    progThumbFs.style.left = p + '%';
    curTimeFs.textContent = fmt(vid.currentTime);
  }
});
vid.addEventListener('progress', () => {
  if (!vid.duration || !vid.buffered.length) return;
  const p = vid.buffered.end(vid.buffered.length - 1) / vid.duration * 100;
  bufBar.style.width = p + '%';
  bufBarFs.style.width = p + '%';
});
vid.addEventListener('durationchange', () => {
  durDisp.textContent = fmt(vid.duration);
  durDispFs.textContent = fmt(vid.duration);
});

// ── Seek ──
function attachSeek(wrap, fillEl, thumbEl, ttEl, dragKey) {
  const doSeek = (e) => {
    const rect = wrap.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    if (vid.duration) {
      vid.currentTime = p * vid.duration;
      fillEl.style.width = (p * 100) + '%';
      thumbEl.style.left = (p * 100) + '%';
    }
  };
  wrap.addEventListener('mousedown', e => { window[dragKey] = true; doSeek(e); });
  wrap.addEventListener('mousemove', e => {
    if (!vid.duration) return;
    const rect = wrap.getBoundingClientRect();
    const p = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
    ttEl.textContent = fmt(p * vid.duration);
    ttEl.style.left = (p * 100) + '%';
    ttEl.style.display = 'block';
    if (window[dragKey]) doSeek(e);
  });
  wrap.addEventListener('mouseup', e => { window[dragKey] = false; doSeek(e); });
  wrap.addEventListener('mouseleave', () => { window[dragKey] = false; ttEl.style.display = 'none'; });
}
attachSeek(progressWrap, progFill, progThumb, tooltip, '_drag');
attachSeek(progressWrapFs, progFillFs, progThumbFs, tooltipFs, '_dragFs');

// ── Play/Pause ──
function togglePlay() {
  vid.paused ? vid.play() : vid.pause();
}
function updatePlayIcons() {
  const svg = vid.paused
    ? '<polygon points="5,3 19,12 5,21"/>'
    : '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  playIcon.innerHTML = svg;
  playIconFs.innerHTML = svg;
}
vid.addEventListener('play', () => { updatePlayIcons(); playOverlay.classList.add('hidden'); });
vid.addEventListener('pause', updatePlayIcons);
vid.addEventListener('waiting', () => loading.classList.remove('hidden'));
vid.addEventListener('playing', () => loading.classList.add('hidden'));

[playBtn, playBtnFs, playOverlay].forEach(el => el.addEventListener('click', togglePlay));
bkBtn.addEventListener('click', () => vid.currentTime = Math.max(0, vid.currentTime - 10));
fwBtn.addEventListener('click', () => vid.currentTime = Math.min(vid.duration || Infinity, vid.currentTime + 10));
bkBtnFs.addEventListener('click', () => vid.currentTime = Math.max(0, vid.currentTime - 10));
fwBtnFs.addEventListener('click', () => vid.currentTime = Math.min(vid.duration || Infinity, vid.currentTime + 10));

// ── Volume ──
function syncVolume(val, muted) {
  vid.volume = Math.max(0, Math.min(1, val));
  vid.muted = muted;
  const display = muted ? 0 : val;
  volSlider.value = display;
  volSliderFs.value = display;
  volWave.style.display = (muted || val === 0) ? 'none' : '';
  volWaveFs.style.display = (muted || val === 0) ? 'none' : '';
}
volSlider.addEventListener('input', () => syncVolume(+volSlider.value, +volSlider.value === 0));
volSliderFs.addEventListener('input', () => syncVolume(+volSliderFs.value, +volSliderFs.value === 0));
muteBtn.addEventListener('click', () => syncVolume(vid.volume, !vid.muted));
muteBtnFs.addEventListener('click', () => syncVolume(vid.volume, !vid.muted));

// ── Fullscreen ──
function enterFs() {
  if (shell.requestFullscreen) shell.requestFullscreen();
  else if (shell.webkitRequestFullscreen) shell.webkitRequestFullscreen();
  else if (shell.mozRequestFullScreen) shell.mozRequestFullScreen();
}
function exitFs() {
  if (document.exitFullscreen) document.exitFullscreen();
  else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
}
fsBtn.addEventListener('click', enterFs);
fsBtnFs.addEventListener('click', exitFs);

// ── Quality menu toggles ──
qualityBtn.addEventListener('click', e => {
  e.stopPropagation();
  qualityMenu.classList.toggle('open');
  qualityMenuFs.classList.remove('open');
});
qualityBtnFs.addEventListener('click', e => {
  e.stopPropagation();
  qualityMenuFs.classList.toggle('open');
  qualityMenu.classList.remove('open');
});
document.addEventListener('click', () => {
  qualityMenu.classList.remove('open');
  qualityMenuFs.classList.remove('open');
});

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') vid.currentTime = Math.max(0, vid.currentTime - 10);
  if (e.code === 'ArrowRight') vid.currentTime = Math.min(vid.duration || Infinity, vid.currentTime + 10);
  if (e.code === 'ArrowUp') syncVolume(vid.volume + 0.1, false);
  if (e.code === 'ArrowDown') syncVolume(vid.volume - 0.1, false);
  if (e.code === 'KeyF') enterFs();
  if (e.code === 'Escape') exitFs();
  if (e.code === 'KeyM') syncVolume(vid.volume, !vid.muted);
});

initPlayer();
</script>
</body>
</html>
