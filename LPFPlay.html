<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Reproductor M3U8</title>
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body {
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(0,0,0,0.6);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            font-weight: 500;
        }
        .video-container {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            border-radius: 12px;
            font-size: 0.85rem;
            word-break: break-all;
        }
        .info a {
            color: #4d9eff;
            text-decoration: none;
        }
        .error-msg {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
        }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📺 Reproductor M3U8</h1>
    <div class="video-container">
        <video
            id="my-video"
            class="video-js vjs-big-play-centered vjs-fluid"
            controls
            preload="auto"
            width="100%"
            height="auto"
            data-setup="{}"
        >
            <source src="https://liveassets.encoders.immergo.tv/lpf/s/am=0,s=ffd893bfa8a51aba8af3f01e7c0a707646ec186e4ac7391d5afc328c5d899372/uvod-live-encoder-assets-1/e27c8565-ad9a-4a6e-9788-2e24b21e5020/00bc4b73-cb60-4a2a-9fb3-35b117c48b36/master.m3u8" type="application/x-mpegURL">
            <p class="vjs-no-js">
                Para ver este video, por favor activá JavaScript o usá un navegador que soporte HTML5 video.
            </p>
        </video>
    </div>
    <div class="info">
        <strong>🔗 Enlace M3U8:</strong><br>
        <span id="url-display"></span><br>
        <small>⚠️ Nota: Si el stream no carga, puede requerir autenticación, estar caído, o necesitar una VPN/red específica. Podés probar el enlace en VLC u otro reproductor para verificar su disponibilidad.</small>
    </div>
    <div id="error-message" class="error-msg"></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
    // Mostrar URL en la info
    const url = "https://liveassets.encoders.immergo.tv/lpf/s/am=0,s=ffd893bfa8a51aba8af3f01e7c0a707646ec186e4ac7391d5afc328c5d899372/uvod-live-encoder-assets-1/e27c8565-ad9a-4a6e-9788-2e24b21e5020/00bc4b73-cb60-4a2a-9fb3-35b117c48b36/master.m3u8";
    document.getElementById('url-display').textContent = url;
    
    // Inicializar el reproductor con manejo de errores mejorado
    const player = videojs('my-video', {
        controls: true,
        autoplay: false,
        preload: 'auto',
        html5: {
            vhs: {
                overrideNative: true,  // Forzar uso de videojs-http-streaming (VHS)
                handleManifestRedirects: true
            },
            nativeAudioTracks: false,
            nativeVideoTracks: false
        }
    });
    
    // Manejar errores de carga
    player.on('error', function() {
        const error = player.error();
        let errorMsg = '❌ Error al cargar el stream. ';
        if (error && error.code) {
            switch(error.code) {
                case 2:
                    errorMsg += 'La URL no es válida o no se pudo conectar.';
                    break;
                case 3:
                    errorMsg += 'Error de reproducción. El stream puede haber terminado.';
                    break;
                case 4:
                    errorMsg += 'Formato no soportado o URL incorrecta.';
                    break;
                default:
                    errorMsg += error.message || 'Error desconocido.';
            }
        } else {
            errorMsg += 'Verificá que el enlace sea accesible desde tu red.';
        }
        document.getElementById('error-message').innerHTML = errorMsg;
        console.error('VideoJS Error:', error);
    });
    
    // Evento cuando se puede reproducir (opcional)
    player.on('canplay', function() {
        document.getElementById('error-message').innerHTML = '';
        console.log('Stream listo para reproducir');
    });
    
    // Evento si el source falla
    player.on('loadstart', function() {
        document.getElementById('error-message').innerHTML = '🔄 Cargando stream...';
    });
</script>
</body>
</html>
