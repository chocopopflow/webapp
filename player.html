<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ChocoPop TV · TNT Sports Chile</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/hls.js/1.4.12/hls.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c12;
      --surface:   #0d1320;
      --border:    #1a2540;
      --accent:    #00e5ff;
      --accent2:   #ff3d71;
      --glow:      rgba(0,229,255,0.18);
      --text:      #e0eaf5;
      --muted:     #4a6080;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      overflow: hidden;
    }

    /* Scanline overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 100;
    }

    /* Ambient corner glow */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 0% 100%, rgba(0,60,120,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 18px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      letter-spacing: 0.12em;
    }

    .header .logo {
      height: 44px;
      width: auto;
      display: block;
      filter: drop-shadow(0 0 8px rgba(255,200,0,0.4));
    }

    .header .channel-name {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .header .channel-name .sub {
      font-family: 'Rajdhani', sans-serif;
      font-size: clamp(10px, 1.6vw, 13px);
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .header .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 10px var(--accent2), 0 0 20px var(--accent2);
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(13px, 2.2vw, 18px);
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(0,229,255,0.5);
      text-transform: uppercase;
    }

    .header .badge {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 900;
      color: var(--accent2);
      border: 1px solid var(--accent2);
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.2em;
      text-shadow: 0 0 8px var(--accent2);
      box-shadow: 0 0 8px rgba(255,61,113,0.25);
    }

    /* Player shell */
    .player-shell {
      position: relative;
      width: 100%;
      max-width: 900px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,229,255,0.07),
        0 0 40px rgba(0,229,255,0.06),
        0 24px 60px rgba(0,0,0,0.7);
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      background: rgba(0,229,255,0.04);
      border-bottom: 1px solid var(--border);
    }

    .top-bar .circles { display: flex; gap: 6px; }
    .top-bar .circles span {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--muted);
      opacity: 0.4;
    }

    .top-bar .url {
      flex: 1;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Rajdhani', monospace;
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .top-bar .tag {
      font-size: 10px;
      font-family: 'Orbitron', monospace;
      color: var(--accent);
      opacity: 0.5;
      letter-spacing: 0.15em;
    }

    /* Video */
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
    }

    video {
      width: 100%; height: 100%;
      display: block;
    }

    /* Overlay when stopped */
    .overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: rgba(8,12,18,0.85);
      transition: opacity 0.3s;
      cursor: pointer;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .play-btn {
      width: 70px; height: 70px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: rgba(0,229,255,0.08);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(0,229,255,0.3), inset 0 0 20px rgba(0,229,255,0.05);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(0,229,255,0.5), inset 0 0 30px rgba(0,229,255,0.1);
    }

    .play-btn svg { margin-left: 5px; }

    /* Controls bar */
    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: rgba(0,0,0,0.35);
      border-top: 1px solid var(--border);
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 5px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
    }

    .ctrl-btn:hover { color: var(--accent); background: rgba(0,229,255,0.08); }

    .volume-wrap {
      display: flex; align-items: center; gap: 8px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 80px; height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px rgba(0,229,255,0.6);
    }

    .live-indicator {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--accent2);
      text-shadow: 0 0 8px var(--accent2);
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 8px var(--accent2);
      animation: blink 1.4s infinite;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      border-top: 1px solid var(--border);
      background: rgba(0,229,255,0.02);
    }

    .status-text {
      font-size: 11px;
      color: var(--muted);
      font-family: 'Rajdhani', monospace;
      letter-spacing: 0.06em;
    }

    #status-msg { color: var(--accent); opacity: 0.7; }

    /* Error */
    .error-box {
      display: none;
      position: absolute; inset: 0;
      align-items: center; justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: rgba(8,12,18,0.9);
      color: var(--accent2);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      text-align: center;
      padding: 20px;
    }

    .error-box.show { display: flex; }
    .error-box p { opacity: 0.7; font-family: 'Rajdhani', sans-serif; font-size: 14px; color: var(--muted); }
  </style>
</head>

<script>
  // URL original del stream
  const STREAM_URL = 'http://45.184.109.10/live/69393EAE6ADBC65A68F942022362A202/86.m3u8';
  // Proxy CORS para evitar bloqueo de contenido mixto HTTP en páginas HTTPS
  const PROXY = 'https://corsproxy.io/?url=';
  const SRC = (location.protocol === 'https:') ? PROXY + encodeURIComponent(STREAM_URL) : STREAM_URL;
  const video   = document.getElementById('video');
  const overlay = document.getElementById('overlay');
  const errBox  = document.getElementById('error-box');
  const statusMsg  = document.getElementById('status-msg');
  const qualityInfo = document.getElementById('quality-info');
  let hls;

  function initHLS() {
    if (Hls.isSupported()) {
      hls = new Hls({ lowLatencyMode: true });
      hls.loadSource(SRC);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        statusMsg.textContent = 'Stream cargado';
        const levels = hls.levels;
        if (levels.length) {
          const res = levels[levels.length-1];
          qualityInfo.textContent = `HLS · ${res.height ? res.height+'p' : 'Auto'}`;
        }
      });
      hls.on(Hls.Events.ERROR, (e, data) => {
        if (data.fatal) {
          errBox.classList.add('show');
          statusMsg.textContent = 'Error de stream';
        }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = SRC;
    } else {
      errBox.classList.add('show');
      statusMsg.textContent = 'Navegador no compatible';
    }
  }

  function startPlay() {
    initHLS();
    overlay.classList.add('hidden');
    video.play().catch(() => {});
    updatePlayIcon(true);
    statusMsg.textContent = 'Reproduciendo...';
  }

  function togglePlay() {
    if (video.paused) {
      video.play();
      updatePlayIcon(true);
      statusMsg.textContent = 'Reproduciendo...';
    } else {
      video.pause();
      updatePlayIcon(false);
      statusMsg.textContent = 'Pausado';
    }
  }

  function updatePlayIcon(playing) {
    document.getElementById('icon-play').style.display  = playing ? 'none'  : 'block';
    document.getElementById('icon-pause').style.display = playing ? 'block' : 'none';
  }

  function toggleMute() {
    video.muted = !video.muted;
    document.getElementById('icon-vol').style.display   = video.muted ? 'none'  : 'block';
    document.getElementById('icon-muted').style.display = video.muted ? 'block' : 'none';
  }

  function setVol(v) {
    video.volume = v;
    if (v == 0) { video.muted = true; }
    else { video.muted = false; }
    document.getElementById('icon-vol').style.display   = video.muted ? 'none'  : 'block';
    document.getElementById('icon-muted').style.display = video.muted ? 'block' : 'none';
  }

  function goFullscreen() {
    const el = document.querySelector('.player-shell');
    if (document.fullscreenElement) document.exitFullscreen();
    else el.requestFullscreen && el.requestFullscreen();
  }

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); if (!overlay.classList.contains('hidden')) startPlay(); else togglePlay(); }
    if (e.code === 'KeyM') toggleMute();
    if (e.code === 'KeyF') goFullscreen();
  });
</script>
