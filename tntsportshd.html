<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="referrer" content="no-referrer">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;}
#player{width:100%;height:100%;}
.jw-progress{background-color:#e8312a !important;}
</style>
</head>
<body>
<div id="player"></div>
<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
<script>
var mt = ["cdn","chromecast"];
var host = mt[Math.floor(Math.random()*mt.length)];
var canal = "TNT_Sports_HD";
var mpd1 = "//" + host + ".cvattv.com.ar/live/c6eds/" + canal + "/SA_Live_dash_enc_C/" + canal + ".mpd";
var mpd2 = "https://cdn.trimi.com.ar/live/sm-live/TNT_SPORTS_BKP4/sa_live_dash_ll/TNT_SPORTS_BKP4.mpd";
var triedFallback = false;

var p = jwplayer("player");
p.setup({
  playlist:[{ sources:[{ type:"dash", file:mpd1, drm:{ clearkey:{ keyId:"bc80fa3da696e503f940fde5f681a1c5", key:"ea46e4e9f1132e8dd71fb77f7d55058a" } } }] }],
  width:"100%", height:"100%", stretching:"exactfit", autostart:true, cast:{}, sharing:{}
});
p.on("play", function(){ try{ p.setCurrentAudioTrack(1); }catch(e){} });
p.on("error", function(){
  if(!triedFallback){
    triedFallback=true;
    p.load([{ sources:[{ type:"dash", file:mpd2, drm:{ clearkey:{ keyId:"4c79a27f46f44bfbb774b8c7f1f1e57f", key:"530fd0cba9dc556a339b03af4b0951b9" } } }] }]);
    p.play();
  }
});
</script>
</body>
</html>
