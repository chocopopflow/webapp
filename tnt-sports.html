<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>TNT Sports Premium</title>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; margin: 0; padding: 0; }
    #player { width: 100%; height: 100vh; }
    .jw-progress { background-color: #56ff00 !important; }
    .jw-text-live::before { background-color: red !important; }
    .jw-reset-text { color: white !important; }
    .jw-controlbar { background-color: rgba(0,0,0,.85) !important; }
    .jw-button-color { color: #ccc !important; }
    .jw-button-color:hover { color: #fff !important; }
    .ios-landscape {
      transform: rotate(90deg); transform-origin: center center;
      width: 100vh !important; height: 100vw !important;
      position: fixed !important; top: 0; left: 0;
      background: #000; z-index: 9999;
    }
    /* Logo watermark */
    #watermark {
      position: fixed; top: 10px; left: 12px;
      z-index: 9998; pointer-events: none;
      opacity: .75;
    }
    #watermark img { height: 36px; object-fit: contain; }
  </style>
</head>
<body>

<div id="watermark">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEigtNNZx_P__kInTLqwCI-Ng33b40d9Z5_1eBpnA0Qvm_Vqx5sy0rTipvLmwf3JLpOpRE5uiI8u5sqU5J1FOu68YdOhYo7kcN7VpiGs4b98S5PqM9mKw3b5SVbXlkLvI9R4l0ZD9H-29KCyC49xcQO4A43CQSYzBC5H-lhFAJ4uvYxHnMiKdT01qgPzvAs/s400/ty443a1769676410.jpg" alt="ChocoPop Flow"/>
</div>

<div id="player"></div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
<script>
  var PROXY  = "https://simovision.juliancejasig.workers.dev/";
  var CDN    = ["cdn02","cdn03"];
  var cdn    = CDN[Math.floor(Math.random()*CDN.length)];
  var STREAM = "https://"+cdn+".gigared.com.ar/live/eds/TNT_Sports_Premium/sa_live_dash/TNT_Sports_Premium.mpd";
  var KEY_ID = "f26eb059fb0854f4d4218c895d7ae803";
  var KEY    = "ffcb3fd4bd5657889215be4cb6275d1b";

  var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isSmartTV = /SmartTV|Tizen|Web0S|SmartHub|Chromecast/i.test(navigator.userAgent);

  jwplayer("player").setup({
    playlist: [{
      title: "TNT Sports Premium",
      description: "EN VIVO",
      sources: [{ file: PROXY+STREAM, drm: { clearkey: { keyId: KEY_ID, key: KEY } } }]
    }],
    autostart: true, mute: false, volume: 100,
    width: "100%", height: "100%",
    stretching: "exactfit", aspectratio: "16:9",
    preload: "auto",
    cast: { appid: "CC1AD845" },
    liveSyncDuration: 3,
    live: { dvrSeekLimit: 3600, edgeMargin: 5 },
    dash: { bufferLength: 1, maxBufferLength: 1 }
  });

  var player = jwplayer("player");

  player.on("play", function() {
    try { player.setCurrentAudioTrack(1); } catch(e) {}
  });

  if (!isSmartTV) {
    player.on("play", function() {
      var video = document.querySelector("#player video");
      if (video && !video._boostApplied) {
        try {
          var ctx = new (window.AudioContext || window.webkitAudioContext)();
          var src = ctx.createMediaElementSource(video);
          var gain = ctx.createGain();
          gain.gain.value = 2;
          src.connect(gain); gain.connect(ctx.destination);
          video.muted = false; video.volume = 1.0;
          video._boostApplied = true;
        } catch(e) {}
      }
    });
  }

  if (isSmartTV) {
    player.on("ready", function() {
      var video = document.querySelector("#player video");
      if (video) { video.muted = false; try { video.volume = 1.0; } catch(e){} }
    });
  }

  player.on("fullscreen", function(e) {
    var c = document.getElementById("player");
    if (!isIOS && screen.orientation) {
      if (e.fullscreen) {
        (async function t(){ try { await screen.orientation.lock("landscape"); } catch(err){ setTimeout(t,200); } })();
      } else { try { screen.orientation.unlock(); } catch(err){} }
    }
    if (isIOS) {
      if (e.fullscreen) c.classList.add("ios-landscape");
      else c.classList.remove("ios-landscape");
    }
  });

  player.on("buffer", function() { try { player.setCurrentQuality(0); } catch(e) {} });
</script>
</body>
</html>
