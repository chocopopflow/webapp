<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mis Películas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --accent: #e8b84b;
    --accent2: #e8674b;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a38;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    padding: 40px 40px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 30px;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    letter-spacing: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    max-width: 400px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 18px 12px 44px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-wrap svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
  }

  .count {
    color: var(--muted);
    font-size: 0.85rem;
    white-space: nowrap;
  }

  /* MODAL PLAYER */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    width: 100%;
    max-width: 900px;
    overflow: hidden;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.95); opacity: 0; }
    to   { transform: scale(1);    opacity: 1; }
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--accent);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1.5rem;
    line-height: 1;
    padding: 4px 8px;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }

  .modal-close:hover { color: var(--text); background: var(--border); }

  .video-wrap {
    position: relative;
    padding-bottom: 56.25%;
    background: #000;
  }

  .video-wrap video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  /* GRID */
  .grid-wrap {
    padding: 30px 40px 60px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    display: flex;
    flex-direction: column;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 30px rgba(232,184,75,0.12);
  }

  .card-thumb {
    background: linear-gradient(135deg, #1e1e2e, #2a1a2e);
    height: 110px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .card-thumb::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(232,184,75,0.05), rgba(232,103,75,0.05));
  }

  .play-icon {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(232,184,75,0.15);
    border: 2px solid rgba(232,184,75,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, border-color 0.2s;
  }

  .card:hover .play-icon {
    background: rgba(232,184,75,0.3);
    border-color: var(--accent);
  }

  .play-icon svg { margin-left: 3px; }

  .card-body {
    padding: 12px 14px 14px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .card-title {
    font-weight: 500;
    font-size: 0.88rem;
    line-height: 1.35;
    color: var(--text);
  }

  .card-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .badge {
    font-size: 0.7rem;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  .badge-year { background: rgba(255,255,255,0.07); color: var(--muted); }
  .badge-lang { background: rgba(232,184,75,0.12); color: var(--accent); }
  .badge-hd   { background: rgba(232,103,75,0.12); color: var(--accent2); }

  .no-results {
    text-align: center;
    color: var(--muted);
    padding: 80px 0;
    font-size: 1rem;
    grid-column: 1 / -1;
  }

  @media (max-width: 600px) {
    header { padding: 24px 20px 16px; }
    .grid-wrap { padding: 20px 16px 40px; }
    h1 { font-size: 2rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
  }
</style>
</head>
<body>

<header>
  <h1>🎬 MIS PELÍCULAS</h1>
  <div class="search-wrap">
    <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search" placeholder="Buscar película..." oninput="filter()">
  </div>
  <span class="count" id="count"></span>
</header>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title"></span>
      <button class="modal-close" onclick="closePlayer()">✕</button>
    </div>
    <div class="video-wrap">
      <video id="player" controls autoplay></video>
    </div>
  </div>
</div>

<script>
const movies = [
  { url: "http://201.217.246.42:44310/cloud_b/Maquina.de.guerra.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_a/Ojo.por.ojo.2025.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/El.guardian.Ultimo.refugio.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Zootopia.2.2025.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/El.enganio.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Recuerdos.mortales.2024.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_a/Presas.del.abismo.2025.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Un.hombre.por.semana.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/13.dias.en.el.lago.de.la.muerte.2025.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/No.nos.dejes.caer.esta.noche.2024.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Scream.7.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Zeta.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Wuthering.Heights.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_a/Peaky.Blinders.El.hombre.inmortal.2026.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Tu.madre.o.la.mia.2024.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Conflicto.de.Amor.2024.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/Estimados.seniores.2024.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/El.elegido.del.mal.2025.720.lat.mp4" },
  { url: "http://201.217.246.42:44310/cloud_b/El.Depredador.Alienigena.2023.720.lat.mp4" },
];

// Parse title, year, lang from filename
function parse(url) {
  const file = url.split('/').pop().replace('.mp4','').replace('.m3u8','');
  const parts = file.split('.');
  let year = '', lang = '', titleParts = [];
  parts.forEach(p => {
    if (/^\d{4}$/.test(p)) year = p;
    else if (/^(lat|sub|esp|eng)$/i.test(p)) lang = p.toUpperCase();
    else if (/^(720|1080|480|4k)$/i.test(p)) {}
    else if (year === '' && lang === '') titleParts.push(p);
  });
  const title = titleParts.join(' ');
  return { title, year, lang };
}

let filtered = [...movies];

function buildGrid(list) {
  const grid = document.getElementById('grid');
  document.getElementById('count').textContent = list.length + ' película' + (list.length !== 1 ? 's' : '');
  if (list.length === 0) {
    grid.innerHTML = '<div class="no-results">No se encontraron películas</div>';
    return;
  }
  grid.innerHTML = list.map((m, i) => {
    const { title, year, lang } = parse(m.url);
    return `<div class="card" onclick="play(${movies.indexOf(m)})">
      <div class="card-thumb">
        <div class="play-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#e8b84b"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
      </div>
      <div class="card-body">
        <div class="card-title">${title}</div>
        <div class="card-meta">
          ${year ? `<span class="badge badge-year">${year}</span>` : ''}
          ${lang ? `<span class="badge badge-lang">${lang}</span>` : ''}
          <span class="badge badge-hd">HD</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filter() {
  const q = document.getElementById('search').value.toLowerCase();
  filtered = movies.filter(m => parse(m.url).title.toLowerCase().includes(q));
  buildGrid(filtered);
}

function play(idx) {
  const m = movies[idx];
  const { title, year } = parse(m.url);
  document.getElementById('modal-title').textContent = title + (year ? ' (' + year + ')' : '');
  const vid = document.getElementById('player');
  vid.src = m.url;
  vid.load();
  vid.play();
  document.getElementById('overlay').classList.add('active');
}

function closePlayer() {
  const vid = document.getElementById('player');
  vid.pause();
  vid.src = '';
  document.getElementById('overlay').classList.remove('active');
}

function closeModal(e) {
  if (e.target === document.getElementById('overlay')) closePlayer();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

buildGrid(movies);
</script>
</body>
</html>
