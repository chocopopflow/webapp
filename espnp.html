<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="referrer" content="no-referrer">
  <title>ESPN Premium</title>
  <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; margin: 0; padding: 0; overflow: hidden; }
    #player { width: 100vw; height: 100vh; }
    .jw-progress { background-color: #e8000d !important; }
    .jw-text-live::before { background-color: red !important; }
    .jw-reset-text { color: white !important; }
    .jw-controlbar { background-color: rgba(0,0,0,.85) !important; }
    .jw-button-color { color: #ccc !important; }
    .jw-button-color:hover { color: #fff !important; }
    .ios-landscape {
      transform: rotate(90deg); transform-origin: center center;
      width: 100vh !important; height: 100vw !important;
      position: fixed !important; top: 0; left: 0;
      background: #000; z-index: 9999;
    }
    #watermark {
      position: fixed; top: 10px; left: 12px;
      z-index: 9998; pointer-events: none; opacity: .85;
    }
    #watermark img { height: 40px; object-fit: contain; }
  </style>
</head>
<body>

<div id="watermark">
  <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEj__O1yMnlZlZywkBnLOOeD0iJfyV-LnYvHeQneJ70wd8-8pdO4jUoZoDDggLBgVmqe5q4uXEnjMipNS5vt-vkXsTGMHujA41MUDSt1WZRagnbAzDIIQRmYO7VtIV7NwGWYvCERmacLwPLLidF2aY2G-ptxYNeK-Cb0aog4rpzm4MOuKin84WY3OoLoFHk/s600/ChocoPop%20FLOW.png" alt="ChocoPop Flow"/>
</div>

<div id="player"></div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";</script>
<script>
  var PROXY  = "https://simovision.juliancejasig.workers.dev/";
  var CDN    = ["cdn02","cdn03"];
  var cdn    = CDN[Math.floor(Math.random()*CDN.length)];
  var STREAM = "https://"+cdn+".gigared.com.ar/live/eds/ESPN_Premium/sa_live_dash/ESPN_Premium.mpd";
  var KEY_ID = "dca96877c202470bdad9839bea525c0a";
  var KEY    = "d651871131d4b26f0095bcb9771b8f2f";
  var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent);
  var isSmartTV = /SmartTV|Tizen|Web0S|SmartHub|Chromecast/i.test(navigator.userAgent);

  jwplayer("player").setup({
    playlist: [{
      title: "ESPN Premium", description: "EN VIVO",
      sources: [{ file: PROXY+STREAM, drm: { clearkey: { keyId: KEY_ID, key: KEY } } }]
    }],
    autostart: true, mute: false, volume: 100,
    width: "100%", height: "100%",
    stretching: "exactfit", aspectratio: "16:9",
    preload: "auto", cast: { appid: "CC1AD845" },
    liveSyncDuration: 3,
    live: { dvrSeekLimit: 3600, edgeMargin: 5 },
    dash: { bufferLength: 1, maxBufferLength: 1 }
  });

  var player = jwplayer("player");
  player.on("play", function() { try { player.setCurrentAudioTrack(1); } catch(e) {} });
  if (isSmartTV) {
    player.on("ready", function() {
      var v = document.querySelector("#player video");
      if (v) { v.muted = false; try { v.volume = 1.0; } catch(e){} }
    });
  }
  player.on("fullscreen", function(e) {
    var c = document.getElementById("player");
    if (!isIOS && screen.orientation) {
      if (e.fullscreen) { (async function t(){ try { await screen.orientation.lock("landscape"); } catch(err){ setTimeout(t,200); } })(); }
      else { try { screen.orientation.unlock(); } catch(err){} }
    }
    if (isIOS) { if (e.fullscreen) c.classList.add("ios-landscape"); else c.classList.remove("ios-landscape"); }
  });
  player.on("buffer", function() { try { player.setCurrentQuality(0); } catch(e) {} });
</script>
</body>
</html>
