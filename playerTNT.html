<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Player</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <script>
    function getParam(name) {
      var regex = new RegExp('[?&]' + name.replace(/[[\]]/g, '\\$&') + '=([^&#]*)');
      var results = regex.exec(location.search);
      return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
    }

    var id   = getParam('get');
    var lang = getParam('lang');
    var langStr = lang ? '&lang=' + lang : '';

    if (!id || id === '#') {
      document.body.innerHTML = '<p style="color:#fff;font-family:sans-serif;padding:20px;">Canal no especificado. Volvé a la página anterior.</p>';
    } else {
      var src = 'https://sopracan-28-04-flotodsplaaerbloeer.blogspot.com/p/pucheeeplaaedepoop1.html?get=' + id + langStr;
      var iframe = document.createElement('iframe');
      iframe.src = src;
      iframe.allow = 'encrypted-media; fullscreen; autoplay';
      iframe.setAttribute('allowfullscreen', '');
      iframe.setAttribute('scrolling', 'no');
      iframe.setAttribute('frameborder', '0');
      document.body.appendChild(iframe);
    }
  </script>
</body>
</html>
