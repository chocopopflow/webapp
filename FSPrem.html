<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Fox Sports Prem HD — CVA TV</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b11;--surface:#0d1220;--surface2:#131b2e;--border:#1a2540;--accent:#e8312a;--accent2:#ff6b63;--text:#e8edf5;--muted:#4a5a78;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 22px;height:52px;background:rgba(13,18,32,.97);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:800;letter-spacing:3px;color:#fff;}
.logo span{color:var(--accent);}
.live-badge{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.15em;color:var(--accent);text-transform:uppercase;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
.channel-header{display:flex;align-items:center;gap:14px;padding:14px 22px;background:var(--surface2);border-bottom:1px solid var(--border);flex-shrink:0;}
.ch-badge{width:48px;height:48px;border-radius:8px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--accent2);text-align:center;line-height:1.2;flex-shrink:0;padding:3px;}
.ch-name{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:800;line-height:1;letter-spacing:.03em;}
.ch-meta{font-size:11px;color:var(--muted);margin-top:4px;display:flex;align-items:center;gap:8px;}
.live-tag{display:inline-flex;align-items:center;gap:4px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;letter-spacing:.1em;padding:2px 8px;border-radius:3px;text-transform:uppercase;}
.live-tag-dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:pulse 1.4s infinite;}
#player-wrap{flex:1;background:#000;position:relative;}
#player{width:100%;height:100%;}
.status-bar{padding:8px 22px;font-size:11px;color:var(--muted);background:var(--bg);border-top:1px solid var(--border);display:flex;align-items:center;gap:7px;min-height:32px;flex-shrink:0;}
.retry-btn{margin-left:auto;padding:4px 14px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;font-family:'Barlow',sans-serif;border-radius:4px;cursor:pointer;transition:all .2s;}
.retry-btn:hover{border-color:var(--accent);color:var(--accent);}
.spin{display:inline-block;animation:spinr .7s linear infinite;}
@keyframes spinr{to{transform:rotate(360deg)}}
.jw-progress{background-color:var(--accent) !important;}
.jw-controlbar{background:rgba(8,11,17,.97) !important;border-top:1px solid var(--border) !important;}
.jw-button-color{color:#5a6d90 !important;}
.jw-reset-text{color:#fff !important;}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">CVA<span>TV</span></div>
    <div class="live-badge"><div class="live-dot"></div>EN VIVO</div>
  </header>
  <div class="channel-header">
    <div class="ch-badge">FOX<br>PREM</div>
    <div>
      <div class="ch-name">Fox Sports Prem HD</div>
      <div class="ch-meta">
        <span class="live-tag"><div class="live-tag-dot"></div>EN VIVO</span>
        Deportes &middot; HD &middot; Cablevisión Argentina
      </div>
    </div>
  </div>
  <div id="player-wrap"><div id="player"></div></div>
  <div class="status-bar" id="status">
    <span class="spin">&#x21BB;</span> Conectando&hellip;
    <button class="retry-btn" onclick="iniciar()">&#x21BB; Reiniciar</button>
  </div>
</div>

<script src="https://ssl.p.jwpcdn.com/player/v/8.26.0/jwplayer.js"></script>
<script>
jwplayer.key = "XSuP4qMl+9tK17QNb+4+th2Pm9AWgMO/cYH8CI0HGGr7bdjo";

var CDN_HOSTS = ["cdn","chromecast"];
function rndHost(){ return CDN_HOSTS[Math.floor(Math.random()*CDN_HOSTS.length)]; }

var ch = {
  b64: "Rm94X1Nwb3J0c19QcmVtaXVuX0hE",
  nombre: "Fox Sports Prem HD",
  n: 7,
  k1: "4c230dbc7f6a4bfa6ad0aa73ff792374",
  k2: "4186a7c2a15f590a9399886feaec4257"
};

var inst = null;

function setStatus(html){ document.getElementById("status").innerHTML = html + ' <button class="retry-btn" onclick="iniciar()">&#x21BB; Reiniciar</button>'; }

function iniciar(){
  var host = rndHost();
  var canal = atob(ch.b64);
  var url = "https://"+host+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";

  setStatus('<span class="spin">&#x21BB;</span> Conectando con '+ch.nombre+'&hellip;');

  if(inst){ try{ inst.remove(); }catch(e){} inst=null; }
  document.getElementById("player").innerHTML="";

  jwplayer("player").setup({
    playlist:[{ title:ch.nombre, description:"EN VIVO",
      sources:[{ file:url, type:"dash", drm:{ clearkey:{ keyId:ch.k1, key:ch.k2 } } }]
    }],
    autostart:true, mute:false, volume:100,
    width:"100%", height:"100%", stretching:"exactfit", aspectratio:"16:9", preload:"auto"
  });

  inst = jwplayer("player");

  inst.on("play", function(){
    setStatus("&#9654; Reproduciendo &middot; "+ch.nombre+" &middot; "+host.toUpperCase());
    try{ inst.setCurrentAudioTrack(1); }catch(e){}
  });
  inst.on("buffer", function(){ setStatus('<span class="spin">&#x21BB;</span> Cargando&hellip;'); });
  inst.on("error", function(){
    var altHost = host==="cdn"?"chromecast":"cdn";
    var altUrl = "https://"+altHost+".cvattv.com.ar/live/c"+ch.n+"eds/"+canal+"/SA_Live_dash_enc_C/"+canal+".mpd";
    setStatus('<span class="spin">&#x21BB;</span> Reintentando servidor alternativo&hellip;');
    try{ inst.load([{sources:[{file:altUrl,type:"dash",drm:{clearkey:{keyId:ch.k1,key:ch.k2}}}]}]); inst.play(); }
    catch(ex){ setStatus("&#x2715; Error. Us&aacute; el bot&oacute;n Reiniciar."); }
  });

  var isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  inst.on("fullscreen",function(e){
    if(!isIOS&&screen.orientation){
      if(e.fullscreen){(async function t(){try{await screen.orientation.lock("landscape");}catch(err){setTimeout(t,200);}})();}
      else{try{screen.orientation.unlock();}catch(err){}}
    }
  });
}

iniciar();
</script>
</body>
</html>
